<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Skills Edit — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/nav.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <div th:replace="~{fragments/nav-admin :: nav-admin}"></div>

  <div class="admin-body site-container">
    <div class="admin-page-header">
      <div>
        <div class="admin-breadcrumb">Admin / <span>Skills</span></div>
        <h1 class="admin-page-title">Skills Edit</h1>
      </div>
    </div>

    <div class="admin-layout">

      <!-- 新增卡片 -->
      <aside class="admin-sidebar">
        <div class="admin-card">
          <div class="admin-card-header">
            <span class="admin-card-icon">&#43;</span>
            <h3 class="admin-card-title">新增卡片</h3>
          </div>
          <form th:action="@{/admin/skills/section/create}" method="post"
                style="display:flex;flex-wrap:wrap;gap:10px;padding:14px 18px;align-items:flex-end">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="admin-field" style="flex:1;min-width:140px;margin:0">
              <label class="admin-label">GroupKey（如 backend / frontend）</label>
              <input class="admin-input" name="groupKey" required
                     placeholder="英文小寫，同分類填相同值">
            </div>
            <div class="admin-field" style="flex:1;min-width:120px;margin:0">
              <label class="admin-label">版型</label>
              <select name="groupType" class="admin-input" style="cursor:pointer">
                <option th:each="t : ${groupTypes}"
                        th:value="${t}" th:text="${t}">TYPE</option>
              </select>
            </div>
            <button type="submit" class="admin-btn-submit"
                    style="margin:0;white-space:nowrap">建立 &#8594;</button>
          </form>
        </div>
      </aside>

      <!-- 現有卡片清單 -->
      <main class="admin-main">
        <div class="admin-card">
          <div class="admin-card-header">
            <span class="admin-card-icon">&#9776;</span>
            <h3 class="admin-card-title">現有 Section</h3>
            <span class="admin-count-badge"
                  th:text="${#maps.size(groupedSections)} + ' 組'">0 組</span>
          </div>

          <div class="admin-list">
            <div th:each="entry : ${groupedSections}" class="admin-group-block">

              <div class="admin-group-header">
                <span class="admin-item-id"
                      th:text="${entry.value[0].sectionLabel != null
                                 ? entry.value[0].sectionLabel
                                 : entry.key}"></span>
                <span class="admin-badge badge-video"
                      th:text="${entry.value[0].groupType}"></span>
                <span class="admin-count-badge"
                      th:text="${#lists.size(entry.value)} + ' 張'"></span>
              </div>

              <div th:each="card : ${entry.value}" class="admin-item admin-item-indent">
                <div class="admin-item-info">
                  <div class="admin-item-id" th:text="'#' + ${card.sortOrder}"></div>
                  <div class="admin-item-title"
                       th:text="${card.title != null ? card.title : '（未填標題）'}"></div>
                  <div class="admin-item-badges">
                    <span th:each="tag : ${card.tags}"
                          class="admin-badge badge-image"
                          th:text="${tag.tagValue}"></span>
                  </div>
                </div>
                <div style="display:flex;gap:8px">
                  <a th:href="@{/admin/skills/section/{id}/edit(id=${card.id})}"
                     class="admin-btn-submit"
                     style="text-decoration:none;padding:7px 13px;font-size:12.5px">編輯</a>
                  <form th:action="@{/admin/skills/section/{id}/delete(id=${card.id})}"
                        method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="admin-btn-danger"
                            onclick="return confirm('確定刪除？')">刪除</button>
                  </form>
                </div>
              </div>

            </div>

            <div th:if="${#maps.isEmpty(groupedSections)}" class="admin-empty">
              <span class="admin-empty-icon">&#128196;</span>
              <p>尚未建立任何技能，從左側新增開始</p>
            </div>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script th:src="@{/js/main.js}"></script>
</body>
</html>
