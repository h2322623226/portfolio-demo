<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Homepage Edit — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/nav.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <div th:replace="~{fragments/nav-admin :: nav-admin}"></div>

  <div class="admin-body site-container">
    <div class="admin-page-header">
      <div>
        <div class="admin-breadcrumb">Admin / <span>Homepage</span></div>
        <h1 class="admin-page-title">Homepage Edit</h1>
      </div>
    </div>

    <div class="admin-layout">

      <!-- ── 左欄：Rail ── -->
      <aside class="admin-sidebar">
        <div class="admin-card">
          <div class="admin-card-header">
            <span class="admin-card-icon">&#128100;</span>
            <h3 class="admin-card-title">個人資料 Rail</h3>
          </div>
          <form th:action="@{/admin/homepage/rail/save}" method="post" class="admin-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="admin-mgmt-group">
              <div class="admin-mgmt-group-label">HEADER</div>
              <div class="admin-field">
                <label class="admin-label">姓名</label>
                <input class="admin-input" name="rail.name"
                       th:value="${content.get('rail.name')}">
              </div>
            </div>
            <div class="admin-mgmt-group">
              <div class="admin-mgmt-group-label">PROFILE</div>
              <div class="admin-field">
                <label class="admin-label">Base</label>
                <input class="admin-input" name="rail.profile.base.value"
                       th:value="${content.get('rail.profile.base.value')}">
              </div>
              <div class="admin-field">
                <label class="admin-label">Focus</label>
                <input class="admin-input" name="rail.profile.focus.value"
                       th:value="${content.get('rail.profile.focus.value')}">
              </div>
              <div class="admin-field">
                <label class="admin-label">Now</label>
                <input class="admin-input" name="rail.profile.now.value"
                       th:value="${content.get('rail.profile.now.value')}">
              </div>
            </div>
            <div class="admin-mgmt-group">
              <div class="admin-mgmt-group-label">CONTACT</div>
              <div class="admin-field">
                <label class="admin-label">Email</label>
                <input class="admin-input" name="rail.contact.email.value"
                       th:value="${content.get('rail.contact.email.value')}">
              </div>
              <div class="admin-field">
                <label class="admin-label">GitHub</label>
                <input class="admin-input" name="rail.contact.github.value"
                       th:value="${content.get('rail.contact.github.value')}">
              </div>
              <div class="admin-field">
                <label class="admin-label">LinkedIn</label>
                <input class="admin-input" name="rail.contact.linkedin.value"
                       th:value="${content.get('rail.contact.linkedin.value')}">
              </div>
            </div>
            <button type="submit" class="admin-btn-submit">&#10003;&ensp;儲存個人資料</button>
          </form>
        </div>
      </aside>

      <!-- ── 右欄：Section 管理 ── -->
      <main class="admin-main">

        <!-- 新增卡片表單 -->
        <div class="admin-card" style="margin-bottom:16px">
          <div class="admin-card-header">
            <span class="admin-card-icon">&#43;</span>
            <h3 class="admin-card-title">新增卡片</h3>
          </div>
          <form th:action="@{/admin/homepage/section/create}" method="post"
                style="display:flex;flex-wrap:wrap;gap:10px;padding:14px 18px;align-items:flex-end">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="admin-field" style="flex:1;min-width:140px;margin:0">
              <label class="admin-label">GroupKey（如 about / projects）</label>
              <input class="admin-input" name="groupKey" required
                     placeholder="英文小寫，同 group 填相同值">
            </div>
            <div class="admin-field" style="flex:1;min-width:120px;margin:0">
              <label class="admin-label">版型</label>
              <select name="groupType" class="admin-input" style="cursor:pointer">
                <option th:each="t : ${groupTypes}"
                        th:value="${t}" th:text="${t}">TYPE</option>
              </select>
            </div>
            <button type="submit" class="admin-btn-submit"
                    style="margin:0;white-space:nowrap">建立 &#8594;</button>
          </form>
        </div>

        <!-- 現有 group 清單 -->
        <div class="admin-card">
          <div class="admin-card-header">
            <span class="admin-card-icon">&#9776;</span>
            <h3 class="admin-card-title">現有 Section</h3>
            <span class="admin-count-badge"
                  th:text="${#maps.size(groupedSections)} + ' 組'">0 組</span>
          </div>

          <div class="admin-list">
            <div th:each="entry : ${groupedSections}" class="admin-group-block">

              <!-- Group 標頭 -->
              <div class="admin-group-header">
                <span class="admin-item-id"
                      th:text="${entry.value[0].sectionLabel != null
                                 ? entry.value[0].sectionLabel
                                 : entry.key}"></span>
                <span class="admin-badge badge-video"
                      th:text="${entry.value[0].groupType}"></span>
                <span class="admin-count-badge"
                      th:text="${#lists.size(entry.value)} + ' 張'"></span>
              </div>

              <!-- Group 內每張卡片 -->
              <div th:each="card : ${entry.value}" class="admin-item admin-item-indent">
                <div class="admin-item-info">
                  <div class="admin-item-id" th:text="'#' + ${card.sortOrder}"></div>
                  <div class="admin-item-title"
                       th:text="${card.title != null ? card.title : '（未填標題）'}"></div>
                  <div class="admin-item-badges">
                    <span th:each="tag : ${card.tags}"
                          class="admin-badge badge-image"
                          th:text="${tag.tagValue}"></span>
                  </div>
                </div>
                <div style="display:flex;gap:8px">
                  <a th:href="@{/admin/homepage/section/{id}/edit(id=${card.id})}"
                     class="admin-btn-submit"
                     style="text-decoration:none;padding:7px 13px;font-size:12.5px">編輯</a>
                  <form th:action="@{/admin/homepage/section/{id}/delete(id=${card.id})}"
                        method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>
                    <button type="submit" class="admin-btn-danger"
                            onclick="return confirm('確定刪除？')">刪除</button>
                  </form>
                </div>
              </div>

            </div>

            <div th:if="${#maps.isEmpty(groupedSections)}" class="admin-empty">
              <span class="admin-empty-icon">&#128196;</span>
              <p>尚未建立任何區塊，從上方新增開始</p>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script th:src="@{/js/main.js}"></script>
</body>
</html>
