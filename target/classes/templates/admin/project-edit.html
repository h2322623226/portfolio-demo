<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>編輯專案 — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/nav.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <div th:replace="~{fragments/nav-admin :: nav-admin}"></div>

  <div class="admin-body site-container">

    <div class="admin-page-header">
      <div>
        <div class="admin-breadcrumb">
          Admin / <a th:href="@{/admin/project}">Projects</a> / <span>編輯</span>
        </div>
        <h1 class="admin-page-title" th:text="'編輯：' + ${item.title}"></h1>
      </div>
    </div>

    <div class="admin-card" style="max-width:640px">
      <div class="admin-card-header">
        <span class="admin-card-icon">&#9998;</span>
        <h3 class="admin-card-title" th:text="${item.title}"></h3>
        <span class="admin-item-id" th:text="'#' + ${item.id}"></span>
      </div>

      <form th:action="@{/admin/project/{id}/save(id=${item.id})}"
            method="post" class="admin-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="admin-mgmt-group">
          <div class="admin-mgmt-group-label">基本資料</div>

          <div class="admin-field">
            <label class="admin-label">Title</label>
            <input type="text" name="title" class="admin-input"
                   th:value="${item.title}" required>
          </div>

          <div class="admin-field">
            <label class="admin-label">Video URL</label>
            <input type="text" name="videoUrl" class="admin-input"
                   th:value="${item.videoUrl}" placeholder="YouTube ID 或 https://...">
          </div>

          <div class="admin-field">
            <label class="admin-label">Image URL</label>
            <input type="text" name="imageUrl" class="admin-input"
                   th:value="${item.imageUrl}" placeholder="https://...">
          </div>

          <div class="admin-field">
            <label class="admin-label">Content</label>
            <textarea name="content" class="admin-input admin-textarea"
                      rows="7" th:text="${item.content}"></textarea>
          </div>
        </div>

        <div class="admin-mgmt-group">
          <div class="admin-mgmt-group-label">TAGS（最多 3 個）</div>
          <div id="tagContainer" style="display:flex;flex-direction:column;gap:6px">
            <div th:each="tag : ${item.tags}"
                 class="tag-row" style="display:flex;gap:8px;align-items:center">
              <input class="admin-input" name="tags"
                     th:value="${tag.tagValue}" placeholder="Tag 名稱" style="flex:1">
              <button type="button" class="admin-btn-danger"
                      onclick="removeTag(this)" style="flex-shrink:0">&#10005;</button>
            </div>
          </div>
          <button type="button" class="admin-add-tag-btn"
                  id="addTagBtn" onclick="addTag()">&#43; 新增 Tag</button>
        </div>

        <div style="display:flex;gap:10px;margin-top:4px">
          <button type="submit" class="admin-btn-submit">&#10003;&ensp;儲存變更</button>
          <a th:href="@{/admin/project}"
             style="padding:10px 18px;border-radius:10px;text-decoration:none;
                    display:inline-flex;align-items:center;
                    border:1px solid var(--line);color:var(--muted)">
            取消
          </a>
        </div>
      </form>
    </div>
  </div>

  <script>
    function addTag() {
      const c = document.getElementById('tagContainer');
      if (c.querySelectorAll('.tag-row').length >= 3) { alert('最多 3 個 Tag'); return; }
      const div = document.createElement('div');
      div.className = 'tag-row';
      div.style.cssText = 'display:flex;gap:8px;align-items:center';
      div.innerHTML =
        '<input class="admin-input" name="tags" placeholder="Tag 名稱" style="flex:1">' +
        '<button type="button" class="admin-btn-danger" style="flex-shrink:0" ' +
        'onclick="removeTag(this)">&#10005;</button>';
      c.appendChild(div);
      syncBtn();
    }

    function removeTag(btn) {
      btn.closest('.tag-row').remove();
      syncBtn();
    }

    function syncBtn() {
      const count = document.querySelectorAll('#tagContainer .tag-row').length;
      document.getElementById('addTagBtn').style.display = count >= 3 ? 'none' : '';
    }

    document.addEventListener('DOMContentLoaded', syncBtn);
  </script>

  <script th:src="@{/js/main.js}"></script>
</body>
</html>
