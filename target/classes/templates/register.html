<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/nav.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <div th:replace="~{fragments/nav :: nav}"></div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-header">
        <div class="auth-icon">&#128100;</div>
        <h2 class="auth-title">Create account</h2>
        <p class="auth-subtitle">建立你的帳號</p>
      </div>

      <div th:if="${usernameExists}" class="auth-error">
        &#9888;&ensp;此 Username 已被使用，請更換。
      </div>
      <div th:if="${passwordMismatch}" class="auth-error">
        &#9888;&ensp;兩次輸入的密碼不一致。
      </div>

      <form th:action="@{/register}" th:object="${form}" method="post" class="auth-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="admin-field">
          <label class="admin-label">Username</label>
          <input th:field="*{username}" type="text"
                 class="admin-input"
                 autocomplete="username"
                 placeholder="設定帳號"
                 required>
          <div th:if="${#fields.hasErrors('username')}"
               class="auth-field-error" th:errors="*{username}"></div>
        </div>

        <div class="admin-field">
          <label class="admin-label">Password</label>
          <input th:field="*{password}" type="password"
                 class="admin-input"
                 autocomplete="new-password"
                 placeholder="設定密碼"
                 required>
          <div th:if="${#fields.hasErrors('password')}"
               class="auth-field-error" th:errors="*{password}"></div>
        </div>

        <div class="admin-field">
          <label class="admin-label">Confirm Password</label>
          <input th:field="*{confirmPassword}" type="password"
                 class="admin-input"
                 autocomplete="new-password"
                 placeholder="再次輸入密碼"
                 required>
          <div th:if="${#fields.hasErrors('confirmPassword')}"
               class="auth-field-error" th:errors="*{confirmPassword}"></div>
        </div>

        <button type="submit" class="auth-submit">Create account</button>
      </form>

      <div class="auth-footer-link">
        已有帳號？<a th:href="@{/login}">回登入</a>
      </div>

    </div>
  </div>

  <div class="layout_minor">
    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>

  <script th:src="@{/js/main.js}"></script>
</body>
</html>
