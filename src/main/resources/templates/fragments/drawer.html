<div th:fragment="drawer">

  <!-- DRAWER — 搭配 nav.html 一起引入 -->
  <div class="drawer-wrapper">
    <button class="drawer-trigger" id="drawerBtn" type="button"
            aria-expanded="false" aria-controls="drawerPanel">
      <span class="drawer-avatar-xs">&#128100;</span>
      <span class="drawer-label">
        <span th:text="${drawerContent.get('rail.name')}">Arauta</span>
        <span class="drawer-role" th:text="${drawerContent.get('rail.role')}">Full-Stack Developer</span>
      </span>
      <span class="drawer-arrow" aria-hidden="true">&#9660;</span>
    </button>

    <div class="drawer-panel" id="drawerPanel" role="region" aria-label="個人資料">
      <div class="drawer-content">
        <div class="drawer-avatar-box">
          <img th:src="${drawerContent.get('rail.avatar')}"
              style="width:100%;height:100%;object-fit:cover"
              alt="avatar">
        </div>
        <div class="drawer-section">
          <div class="drawer-section-label">PROFILE</div>
          <div class="drawer-kv">
            <b>Base</b>
            <span th:text="${drawerContent.get('rail.profile.base.value')}"></span>
            <b>Focus</b>
            <span th:text="${drawerContent.get('rail.profile.focus.value')}"></span>
            <b>Now</b>
            <span th:text="${drawerContent.get('rail.profile.now.value')}"></span>
          </div>
        </div>

        <div class="drawer-section">
          <div class="drawer-section-label">CONTACT</div>
          <div class="drawer-kv">
            <b>Email</b>
            <span><a th:href="'mailto:' + ${drawerContent.get('rail.contact.email.value')}"
                     th:text="${drawerContent.get('rail.contact.email.value')}"></a></span>
            <b>GitHub</b>
            <span><a th:href="${drawerContent.get('rail.contact.github.value')}"
                     th:text="${drawerContent.get('rail.contact.github.value')}"
                     target="_blank" rel="noreferrer"></a></span>
          </div>
          <div class="drawer-section-label" style="margin-top:14px">HIGHLIGHTS</div>
          <div class="drawer-kv">
            <b>Currently</b>
            <span th:text="${drawerContent.get('rail.highlights.strength.value')}"></span>
            <b>Open to</b>
            <span th:text="${drawerContent.get('rail.highlights.style.value')}"></span>
          </div>
        </div>

      </div>
    </div>
  </div>

</div>
