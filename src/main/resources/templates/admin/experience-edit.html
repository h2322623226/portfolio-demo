<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>編輯條目 — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/nav.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <div th:replace="~{fragments/nav-admin :: nav-admin}"></div>

  <div class="admin-body site-container">
    <div class="admin-page-header">
      <div>
        <div class="admin-breadcrumb">
          Admin / <a th:href="@{/admin/experience}">Experience</a> / <span>編輯</span>
        </div>
        <h1 class="admin-page-title" th:text="'編輯：' + ${item.title}"></h1>
      </div>
    </div>

    <div class="admin-card" style="max-width:560px">
      <div class="admin-card-header">
        <span class="admin-card-icon">&#9998;</span>
        <h3 class="admin-card-title" th:text="${item.title}"></h3>
        <span class="admin-item-id" th:text="'#' + ${item.id}"></span>
      </div>

      <form th:action="@{/admin/experience/{id}/save(id=${item.id})}"
            method="post" class="admin-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="admin-field">
          <label class="admin-label">年份</label>
          <input class="admin-input" name="year" th:value="${item.year}" required>
        </div>
        <div class="admin-field">
          <label class="admin-label">標題</label>
          <input class="admin-input" name="title" th:value="${item.title}" required>
        </div>
        <div class="admin-field">
          <label class="admin-label">說明</label>
          <textarea class="admin-input admin-textarea" name="body"
                    rows="5" th:text="${item.body}"></textarea>
        </div>

        <div style="display:flex;gap:10px;margin-top:4px">
          <button type="submit" class="admin-btn-submit">&#10003;&ensp;儲存</button>
          <a th:href="@{/admin/experience}"
             style="padding:10px 18px;border-radius:10px;text-decoration:none;
                    display:inline-flex;align-items:center;
                    border:1px solid var(--line);color:var(--muted)">取消</a>
        </div>
      </form>
    </div>
  </div>

  <script th:src="@{/js/main.js}"></script>
</body>
</html>
