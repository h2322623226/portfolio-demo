<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Experience Edit — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/nav.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <div th:replace="~{fragments/nav-admin :: nav-admin}"></div>

  <div class="admin-body site-container">
    <div class="admin-page-header">
      <div>
        <div class="admin-breadcrumb">Admin / <span>Experience</span></div>
        <h1 class="admin-page-title">Experience Edit</h1>
      </div>
    </div>

    <div class="admin-layout">

      <!-- 新增表單 -->
      <aside class="admin-sidebar">
        <div class="admin-card">
          <div class="admin-card-header">
            <span class="admin-card-icon">&#43;</span>
            <h3 class="admin-card-title">新增條目</h3>
          </div>
          <form th:action="@{/admin/experience/create}" method="post" class="admin-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="admin-field">
              <label class="admin-label">年份</label>
              <input class="admin-input" name="year" placeholder="2024" required>
            </div>
            <div class="admin-field">
              <label class="admin-label">標題</label>
              <input class="admin-input" name="title" placeholder="" required>
            </div>
            <div class="admin-field">
              <label class="admin-label">說明</label>
              <textarea class="admin-input admin-textarea" name="body"
                        rows="4" placeholder="經歷"></textarea>
            </div>
            <button type="submit" class="admin-btn-submit">&#10003;&ensp;新增條目</button>
          </form>
        </div>
      </aside>

      <!-- 現有條目清單 -->
      <main class="admin-main">
        <div class="admin-card">
          <div class="admin-card-header">
            <span class="admin-card-icon">&#9776;</span>
            <h3 class="admin-card-title">現有條目</h3>
            <span class="admin-count-badge"
                  th:text="${#lists.size(experienceList)} + ' 筆'">0 筆</span>
          </div>

          <div class="admin-list">
            <div th:each="item : ${experienceList}" class="admin-item">
              <div class="admin-item-info">
                <div class="admin-item-id" th:text="${item.year}"></div>
                <div class="admin-item-title" th:text="${item.title}"></div>
              </div>
              <div style="display:flex;gap:8px">
                <a th:href="@{/admin/experience/{id}/edit(id=${item.id})}"
                   class="admin-btn-submit"
                   style="text-decoration:none;padding:7px 13px;font-size:12.5px">編輯</a>
                <form th:action="@{/admin/experience/{id}/delete(id=${item.id})}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="admin-btn-danger"
                          onclick="return confirm('確定刪除？')">刪除</button>
                </form>
              </div>
            </div>

            <div th:if="${#lists.isEmpty(experienceList)}" class="admin-empty">
              <span class="admin-empty-icon">&#128197;</span>
              <p>尚未新增任何條目，從左側開始</p>
            </div>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script th:src="@{/js/main.js}"></script>
</body>
</html>
