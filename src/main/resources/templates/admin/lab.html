<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Lab — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/nav.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <div th:replace="~{fragments/nav-admin :: nav-admin}"></div>

  <div class="admin-body site-container">
    <div class="admin-page-header">
      <div>
        <div class="admin-breadcrumb">Admin / <span>Lab</span></div>
        <h1 class="admin-page-title">Lab</h1>
      </div>
    </div>

    <div class="admin-layout">

      <!-- 新增表單 -->
      <aside class="admin-sidebar">
        <div class="admin-card">
          <div class="admin-card-header">
            <span class="admin-card-icon">&#43;</span>
            <h3 class="admin-card-title">新增項目</h3>
          </div>
          <form th:action="@{/admin/lab/save}" method="post" class="admin-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="admin-field">
              <label class="admin-label">Name</label>
              <input class="admin-input" name="name" required placeholder="工具名稱">
            </div>
            <div class="admin-field">
              <label class="admin-label">Description</label>
              <input class="admin-input" name="description" placeholder="說明">
            </div>
            <div class="admin-field">
              <label class="admin-label">Link URL</label>
              <input class="admin-input" name="linkUrl" placeholder="https://...">
            </div>
            <div class="admin-field">
              <label class="admin-label">Image URL</label>
              <input class="admin-input" name="imageUrl" placeholder="預覽圖 https://...">
            </div>
            <div class="admin-mgmt-group">
              <div class="admin-mgmt-group-label">TAGS（最多 3 個）</div>
              <div id="tagContainer" style="display:flex;flex-direction:column;gap:6px"></div>
              <button type="button" class="admin-add-tag-btn"
                      id="addTagBtn" onclick="addTag()">&#43; 新增 Tag</button>
            </div>
            <button type="submit" class="admin-btn-submit">&#10003;&ensp;新增項目</button>
          </form>
        </div>
      </aside>

      <!-- 現有項目清單 -->
      <main class="admin-main">
        <div class="admin-card">
          <div class="admin-card-header">
            <span class="admin-card-icon">&#9776;</span>
            <h3 class="admin-card-title">現有項目清單</h3>
            <span class="admin-count-badge"
                  th:text="${#lists.size(labItems)} + ' 項'">0 項</span>
          </div>

          <div class="admin-list">
            <div th:each="item : ${labItems}" class="admin-item">
              <div class="admin-item-info">
                <div class="admin-item-id" th:text="'#' + ${item.id}"></div>
                <div class="admin-item-title" th:text="${item.name}"></div>
                <div class="admin-item-badges">
                  <span th:if="${not #strings.isEmpty(item.linkUrl)}"
                        class="admin-badge badge-video">LINK</span>
                  <span th:if="${not #strings.isEmpty(item.imageUrl)}"
                        class="admin-badge badge-image">IMG</span>
                  <span th:each="tag : ${item.tags}"
                        class="admin-badge"
                        th:text="${tag.tagValue}"
                        style="background:rgba(255,255,255,.07);color:var(--muted)"></span>
                </div>
              </div>
              <div style="display:flex;gap:8px">
                <a th:href="@{/admin/lab/{id}/edit(id=${item.id})}"
                   class="admin-btn-submit"
                   style="text-decoration:none;padding:7px 13px;font-size:12.5px">編輯</a>
                <form th:action="@{/admin/lab/{id}/delete(id=${item.id})}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="admin-btn-danger"
                          onclick="return confirm('確定刪除？')">刪除</button>
                </form>
              </div>
            </div>

            <div th:if="${#lists.isEmpty(labItems)}" class="admin-empty">
              <span class="admin-empty-icon">&#128301;</span>
              <p>尚未新增任何項目</p>
            </div>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script>
    function addTag() {
      const c = document.getElementById('tagContainer');
      if (c.querySelectorAll('.tag-row').length >= 3) { alert('最多 3 個 Tag'); return; }
      const div = document.createElement('div');
      div.className = 'tag-row';
      div.style.cssText = 'display:flex;gap:8px;align-items:center';
      div.innerHTML =
        '<input class="admin-input" name="tags" placeholder="Tag 名稱" style="flex:1">' +
        '<button type="button" class="admin-btn-danger" style="flex-shrink:0" ' +
        'onclick="removeTag(this)">&#10005;</button>';
      c.appendChild(div);
      syncBtn();
    }
    function removeTag(btn) {
      btn.closest('.tag-row').remove();
      syncBtn();
    }
    function syncBtn() {
      const count = document.querySelectorAll('#tagContainer .tag-row').length;
      document.getElementById('addTagBtn').style.display = count >= 3 ? 'none' : '';
    }
  </script>

  <script th:src="@{/js/main.js}"></script>
</body>
</html>
