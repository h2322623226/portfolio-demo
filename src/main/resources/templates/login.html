<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/nav.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <div th:replace="~{fragments/nav :: nav}"></div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-header">
        <div class="auth-icon">&#128274;</div>
        <h2 class="auth-title">Sign in</h2>
        <p class="auth-subtitle">Welcome back</p>
      </div>

      <div th:if="${param.error}" class="auth-error">
        &#9888;&ensp;帳號或密碼錯誤，請重試。
      </div>

      <form th:action="@{/login}" method="post" class="auth-form">
        <div class="admin-field">
          <label class="admin-label">Username</label>
          <input name="username" type="text"
                 class="admin-input"
                 autocomplete="username"
                 placeholder="輸入帳號"
                 required>
        </div>
        <div class="admin-field">
          <label class="admin-label">Password</label>
          <input name="password" type="password"
                 class="admin-input"
                 autocomplete="current-password"
                 placeholder="輸入密碼"
                 required>
        </div>
        <button type="submit" class="auth-submit">Sign in</button>
      </form>

      <div class="auth-footer-link">
        還沒有帳號？<a th:href="@{/register}">Register</a>
      </div>

    </div>
  </div>

  <div class="layout_minor">
    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>

  <script th:src="@{/js/main.js}"></script>
</body>
</html>
