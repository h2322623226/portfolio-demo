<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${content.get('head.title')}"></title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/nav.css}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <div th:replace="~{fragments/nav :: nav}"></div>
  <div th:replace="~{fragments/drawer :: drawer}"></div>

  <div class="layout">
    <div th:each="entry : ${groupedSections}"
         th:with="cards=${entry.value}, type=${cards[0].groupType.name()}">

      <section>
        <div class="section-title" th:if="${cards[0].sectionLabel != null}">
          <h2 th:text="${cards[0].sectionLabel}"></h2>
        </div>

        <!-- SINGLE -->
        <div th:if="${type == 'SINGLE'}" class="grid-row">
          <div th:each="card : ${cards}" class="content-card card-full">
            <h3 th:text="${card.title}"></h3>
            <p  th:utext="${card.bodyHtml}"></p>
            <div class="tags" th:if="${not #lists.isEmpty(card.tags)}">
              <span th:each="tag : ${card.tags}"
                    class="tag" th:text="${tag.tagValue}"></span>
            </div>
          </div>
        </div>

        <!-- TWO_COL -->
        <div th:if="${type == 'TWO_COL'}" class="grid-row">
          <article th:each="card : ${cards}" class="content-card">
            <h3 th:text="${card.title}"></h3>
            <div class="card-meta" th:text="${card.subtitle}"></div>
            <p th:utext="${card.bodyHtml}"></p>
          </article>
        </div>

        <!-- TWO_ONE -->
        <div th:if="${type == 'TWO_ONE'}" class="grid-row">
          <div th:each="card, iterStat : ${cards}"
               th:classappend="${iterStat.index == 2} ? 'card-full' : ''"
               class="content-card">
            <h3 th:text="${card.title}"></h3>
            <p  th:utext="${card.bodyHtml}"></p>
            <div class="tags" th:if="${not #lists.isEmpty(card.tags)}">
              <span th:each="tag : ${card.tags}"
                    class="tag" th:text="${tag.tagValue}"></span>
            </div>
          </div>
        </div>

        <!-- TIMELINE -->
        <div th:if="${type == 'TIMELINE'}" class="timeline">
          <div th:each="card : ${cards}" class="timeline-row">
            <div class="year" th:text="${card.year}"></div>
            <div>
              <h3 th:text="${card.title}"></h3>
              <p class="desc" th:utext="${card.bodyHtml}"></p>
            </div>
          </div>
        </div>

      </section>
    </div>
  </div>

  <div class="layout_minor">
    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>

  <script th:src="@{/js/main.js}"></script>
</body>
</html>
