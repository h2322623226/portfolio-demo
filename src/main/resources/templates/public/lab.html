<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Lab - Portfolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/nav.css}">
  <link rel="stylesheet" th:href="@{/css/lab.css}">
</head>
<body>

  <div th:replace="~{fragments/nav :: nav}"></div>
  <div th:replace="~{fragments/drawer :: drawer}"></div>

  <div class="layout">

    <header class="page-header">
      <h1 class="page-title">Lab</h1>
      <p class="page-desc">線上小工具與實驗性作品</p>
    </header>
    
    <section class="page-section">
      <div class="grid-row">

        <div th:each="item : ${labEntries}" class="content-card lab-card">
          <div class="lab-card-preview"
               th:style="${not #strings.isEmpty(item.imageUrl)}
                          ? 'background-image:url(' + ${item.imageUrl} + ')'
                          : ''">
            <span th:if="${#strings.isEmpty(item.imageUrl)}"
                  class="lab-card-placeholder">&#128301;</span>
          </div>
          <h3 th:text="${item.name}"></h3>
          <p th:utext="${item.description}"></p>
          <div class="tags">
            <span th:each="tag : ${item.tags}"
                  class="tag" th:text="${tag.tagValue}"></span>
          </div>
          <a th:if="${not #strings.isEmpty(item.linkUrl)}"
             th:href="${item.linkUrl}"
             target="_blank" rel="noreferrer"
             class="lab-open-btn">開啟 &#8599;</a>
        </div>

      </div>

      <div th:if="${#lists.isEmpty(labEntries)}"
           style="padding:60px 0;text-align:center;color:var(--muted)">
        尚未新增任何作品
      </div>
    </section>

  </div>

  <div class="layout_minor">
    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>

  <script th:src="@{/js/main.js}"></script>
</body>
</html>
