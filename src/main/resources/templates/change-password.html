<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>變更密碼</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/variables.css}">
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/nav.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

  <div th:replace="~{fragments/nav :: nav}"></div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-header">
        <div class="auth-icon">&#128274;</div>
        <h1 class="auth-title">變更密碼</h1>
        <p class="auth-subtitle">請輸入目前密碼與新密碼</p>
      </div>

      <!-- 成功訊息 -->
      <div th:if="${param.success}"
           style="margin:14px 20px 0;padding:10px 14px;border-radius:10px;
                  background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.25);
                  color:rgba(52,211,153,.90);font-size:13px">
        密碼已成功更新
      </div>

      <!-- 錯誤訊息 -->
      <div th:if="${wrongPassword}" class="auth-error">目前密碼不正確</div>
      <div th:if="${confirmMismatch}" class="auth-error">新密碼與確認密碼不一致</div>

      <form th:action="@{/change-password}" method="post" class="auth-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="admin-field">
          <label class="admin-label">目前密碼</label>
          <input class="admin-input" type="password" name="oldPassword"
                 required autocomplete="current-password">
        </div>
        <div class="admin-field">
          <label class="admin-label">新密碼</label>
          <input class="admin-input" type="password" name="newPassword"
                 required autocomplete="new-password" minlength="6">
        </div>
        <div class="admin-field">
          <label class="admin-label">確認新密碼</label>
          <input class="admin-input" type="password" name="confirmPassword"
                 required autocomplete="new-password" minlength="6">
        </div>

        <button type="submit" class="auth-submit">確認變更</button>
      </form>

      <div class="auth-footer-link">
        <a th:href="@{/public/}">&#8592; 返回首頁</a>
      </div>

    </div>
  </div>

  <script th:src="@{/js/main.js}"></script>
</body>
</html>
